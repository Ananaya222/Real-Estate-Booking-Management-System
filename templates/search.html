{% extends 'base.html' %}
{% block content %}
    <h2>List of properties in {{ request.GET.area }}</h2>
    <div class="container">
        <div class="jumbotron">
            <div class="row">
                {% for i in result %}
                    <div class="col-md-4  mb-4">
                        <div class="card h-100 shadow p-3">
                            {% if i.property_image %}
                                <img src="{{ i.property_image.url }}" alt="">
                            {% endif %}
                            <div class="card-body">
                                <h5> {{ i.name }}</h5>
                                <p>{{ i.owner_name }}</p>
                                <p>₹ {{ i.price }}</p>
                            </div>
                        </div>

                    </div>

                    {% empty %}
                    <p>No property found </p>
                {% endfor %}
            </div>
        </div>
    </div>
{% endblock%}
